name: Watchdog - Ensure Pipelines Run

on:
  schedule:
    # Run every 30 minutes -- GitHub may skip some, but at this frequency
    # enough will fire to catch any missed evening/morning pipelines
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check and trigger missed pipelines
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HOUR_UTC=$(date -u +%H)
          TODAY=$(date -u +%Y-%m-%d)
          YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d)

          echo "Current UTC time: $(date -u)"
          echo "Today: $TODAY"

          # Evening pipeline should run around midnight UTC (5pm Pacific)
          # Check from 0-6 UTC (5pm-11pm Pacific)
          if [ "$HOUR_UTC" -ge 0 ] && [ "$HOUR_UTC" -le 6 ]; then
            echo "Checking if evening pipeline ran..."
            LAST_EVENING=$(gh run list --workflow=evening.yml --limit=1 --json createdAt,conclusion --jq '.[0].createdAt' 2>/dev/null || echo "")

            if echo "$LAST_EVENING" | grep -q "$TODAY"; then
              echo "Evening pipeline already ran today. OK."
            else
              echo "Evening pipeline has NOT run today. Triggering now."
              gh workflow run evening.yml
            fi
          fi

          # Morning pipeline should run around noon UTC (5am Pacific)
          # Check from 12-18 UTC (5am-11am Pacific)
          if [ "$HOUR_UTC" -ge 12 ] && [ "$HOUR_UTC" -le 18 ]; then
            echo "Checking if morning pipeline ran..."
            LAST_MORNING=$(gh run list --workflow=morning.yml --limit=1 --json createdAt,conclusion --jq '.[0].createdAt' 2>/dev/null || echo "")

            if echo "$LAST_MORNING" | grep -q "$TODAY"; then
              echo "Morning pipeline already ran today. OK."
            else
              echo "Morning pipeline has NOT run today. Triggering now."
              gh workflow run morning.yml
            fi
          fi

          echo "Watchdog complete."
