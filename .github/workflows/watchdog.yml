name: Watchdog - Ensure Pipelines Run

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check and trigger missed pipelines
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HOUR_UTC=$(date -u +%H)
          TODAY=$(date -u +%Y-%m-%d)

          echo "Current UTC time: $(date -u)"

          # Morning pipeline should run around 10am UTC (3am Pacific, targeting 5am delivery)
          # Check from 11-18 UTC (4am-11am Pacific) - catch it if cron missed
          if [ "$HOUR_UTC" -ge 11 ] && [ "$HOUR_UTC" -le 18 ]; then
            echo "Checking if morning pipeline ran today..."
            LAST_RUN=$(gh run list --workflow="Morning Pipeline - Preview and Send" --limit=1 --json createdAt --jq '.[0].createdAt' 2>/dev/null || echo "")

            if echo "$LAST_RUN" | grep -q "$TODAY"; then
              echo "Morning pipeline already ran today. OK."
            else
              echo "Morning pipeline has NOT run today. Triggering now."
              gh workflow run morning-preview.yml
            fi
          fi

          echo "Watchdog complete."
