name: Watchdog - Ensure Pipelines Run

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check and trigger missed pipelines
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HOUR_UTC=$(date -u +%H)
          TODAY=$(date -u +%Y-%m-%d)

          echo "Current UTC time: $(date -u)"
          echo "Today: $TODAY"

          # Morning preview should run around noon UTC (5am Pacific)
          # Check from 12-16 UTC (5am-9am Pacific)
          if [ "$HOUR_UTC" -ge 12 ] && [ "$HOUR_UTC" -le 16 ]; then
            echo "Checking if morning preview ran today..."
            LAST_PREVIEW=$(gh run list --workflow=morning-preview.yml --limit=1 --json createdAt --jq '.[0].createdAt' 2>/dev/null || echo "")

            if echo "$LAST_PREVIEW" | grep -q "$TODAY"; then
              echo "Morning preview already ran today. OK."
            else
              echo "Morning preview has NOT run today. Triggering now."
              gh workflow run morning-preview.yml
            fi
          fi

          echo "Watchdog complete."
