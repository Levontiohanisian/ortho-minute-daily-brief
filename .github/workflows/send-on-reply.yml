name: Send On Reply - Check for reply and send

on:
  schedule:
    # Every 10 minutes between 12:10-17:50 UTC (5:10am-10:50am Pacific)
    - cron: '*/10 12-17 * * *'
  workflow_dispatch:

jobs:
  check-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest data
        run: git pull --rebase origin main

      - name: Check for reply and send if ready
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: python run_send_on_reply.py

      - name: Commit updated status
        run: |
          git config user.name "ortho-minute-bot"
          git config user.email "bot@theorthominute.com"
          git add data/daily/
          git diff --cached --quiet || git commit -m "Update brief status for $(date -u +%Y-%m-%d)"
          git push
