name: Morning Pipeline - Preview and Send

on:
  schedule:
    # Target 5am Pacific. Set to 3am Pacific (10am UTC) to compensate
    # for GitHub Actions cron delays of up to 2 hours
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  preview-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run combined pipeline (scrape, preview, wait for reply, send)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PREVIEW_RECIPIENT: ${{ secrets.PREVIEW_RECIPIENT }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: python run_morning_combined.py

      - name: Commit data
        run: |
          git config user.name "ortho-minute-bot"
          git config user.email "bot@theorthominute.com"
          git add data/daily/
          git diff --cached --quiet || git commit -m "Daily brief for $(date -u +%Y-%m-%d)"
          git push
